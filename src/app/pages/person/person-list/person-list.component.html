<p-toast position="top-center"></p-toast>
<p-confirmDialog></p-confirmDialog>
<div class="grid">
    <div class="col-12">
        <div class="card">
            <p-toolbar class="block mb-3">
                <ng-template pTemplate="left">
                    <h2>Lista de Pessoa(s)</h2>
                </ng-template>
                <ng-template pTemplate="right">
                    <button
                        pButton
                        pRipple
                        label="Adicionar"
                        icon="pi pi-plus"
                        class="p-button-primary p-button-sm"
                        (click)="newPerson()"
                    ></button>
                </ng-template>
            </p-toolbar>

            <div class="grid">
                <div class="col-12">
                    <p-table
                        #dt1
                        [value]="personList"
                        sortField="id"
                        [sortOrder]="-1"
                        styleClass="p-datatable-striped"
                        [scrollable]="true"
                        scrollHeight="50vh"
                        [globalFilterFields]="['id', 'name']"
                        [rowHover]="true"
                    >
                        <ng-template pTemplate="caption">
                            <div
                                class="flex justify-content-between flex-column sm:flex-row"
                            >
                                <span class="p-input-icon-left">
                                    <i class="pi pi-search"></i>
                                    <input
                                        #filterInput
                                        pInputText
                                        type="text"
                                        class="busca"
                                        (input)="
                                            dt1.filterGlobal(
                                                filterInput.value,
                                                'contains'
                                            )
                                        "
                                        placeholder="Buscar"
                                    />
                                </span>
                            </div>
                        </ng-template>

                        <ng-template pTemplate="header">
                            <tr>
                                <th scope="col" style="text-align: center">
                                    Id
                                </th>
                                <th scope="col" style="text-align: center">
                                    Nome
                                </th>
                                <th scope="col"></th>
                            </tr>
                        </ng-template>
                        <ng-template pTemplate="body" let-person>
                            <tr>
                                <td class="text-center">
                                    {{ person.id }}
                                </td>
                                <td class="text-center">{{ person.name }}</td>
                                <td>
                                    <button
                                        pButton
                                        pRipple
                                        icon="pi pi-pencil"
                                        label="Editar"
                                        class="p-button-secondary p-button-sm m-1"
                                        (click)="editPerson(person)"
                                    ></button>
                                    <button
                                        pButton
                                        pRipple
                                        icon="pi pi-trash"
                                        label="Excluir"
                                        class="p-button-delete p-button-sm m-1"
                                        (click)="deletePerson(person)"
                                    ></button>
                                </td>
                            </tr>
                        </ng-template>
                    </p-table>
                </div>
            </div>
        </div>
    </div>
</div>
