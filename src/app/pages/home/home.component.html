<p-toast position="top-center"></p-toast>
<p-confirmDialog></p-confirmDialog>
<div class="grid">
    <div class="col-12">
        <div class="card">
            <p-toolbar class="block mb-3">
                <ng-template pTemplate="left">
                    <h2>Gerenciamento de Gastos</h2>
                </ng-template>
            </p-toolbar>

            <p-tabView styleClass="tabview-custom">
                <p-tabPanel>
                    <ng-template pTemplate="header">
                        <span>Contas Gerais</span>
                    </ng-template>
                </p-tabPanel>

                <p-tabPanel *ngFor="let billPerson of billDTO.billPerson">
                    <ng-template pTemplate="header">
                        <span>{{ billPerson.name }}</span>
                    </ng-template>
                </p-tabPanel>
            </p-tabView>
        </div>
    </div>
</div>
